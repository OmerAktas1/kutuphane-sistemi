version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kutuphane-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: kutuphane
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kutuphane-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.dockerfile
    container_name: kutuphane-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/kutuphane
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro
    networks:
      - kutuphane-dev-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  kutuphane-dev-network:
    driver: bridge
